add_newline = true

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[fill]
symbol = ' '

[directory]
truncation_length = 3
truncate_to_repo = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[git_branch]
symbol = " "

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 500
format = " took [$duration](bold yellow)"
